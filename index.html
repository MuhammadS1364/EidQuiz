<!DOCTYPE html>
<html lang="ur">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>علمِ ابراہیمی | Quiz Competition</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.6.0/css/all.min.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Amiri:wght@400;700&family=Noto+Nastaliq+Urdu:wght@400;700&display=swap');

        :root {
            --primary: #1e40af;
            --accent: #166534;
        }

        body {
            font-family: 'Noto Nastaliq Urdu', system-ui, sans-serif;
        }

        .question-text {
            font-size: 1.25rem;
            line-height: 1.8;
        }

        .option-btn {
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        }

        .option-btn:hover {
            transform: translateY(-3px);
            box-shadow: 0 10px 15px -3px rgb(0 0 0 / 0.1);
        }

        .selected {
            background-color: #166534 !important;
            color: white !important;
            border-color: #4ade80 !important;
            box-shadow: 0 0 0 4px rgba(74, 222, 128, 0.3);
        }

        .correct {
            background-color: #166534 !important;
            color: white;
        }

        .incorrect {
            background-color: #991b1b;
            color: white;
        }

        .progress-bar {
            transition: width 0.4s ease;
        }

        .card {
            background: linear-gradient(145deg, #f8fafc, #e0f2fe);
        }

        .islamic-pattern {
            background-image:
                linear-gradient(rgba(234, 179, 8, 0.08) 1px, transparent 1px),
                linear-gradient(90deg, rgba(234, 179, 8, 0.08) 1px, transparent 1px);
            background-size: 40px 40px;
        }
    </style>
</head>

<body class="bg-gradient-to-br from-slate-50 to-emerald-50 min-h-screen">

    <!-- REGISTRATION SCREEN -->
    <div id="registerScreen" class="min-h-screen flex items-center justify-center p-4">
        <div class="max-w-lg w-full">
            <div class="text-center mb-8">
                <div
                    class="inline-flex items-center justify-center w-20 h-20 bg-emerald-600 text-white rounded-2xl mb-4 shadow-xl">
                    <i class="fa-solid fa-kaaba text-4xl"></i>
                </div>
                <h1 class="text-4xl font-bold text-emerald-800">علمِ ابراہیمی</h1>
                <p class="text-emerald-700 mt-2 text-lg">Quiz Competition</p>
            </div>

            <div class="card shadow-2xl rounded-3xl p-8 border border-emerald-100">
                <h2 class="text-2xl font-semibold text-center mb-6 text-slate-800">رجسٹریشن فارم</h2>

                <form id="playerForm" class="space-y-6">
                    <div>
                        <label class="block text-sm font-medium text-slate-600 mb-1">User ID</label>
                        <input type="text" id="UserId" name="UserId"
                            class="w-full px-4 py-3 rounded-2xl border border-slate-200 focus:border-emerald-500 focus:ring-2 focus:ring-emerald-200 outline-none"
                            readonly value="AUTO-">
                    </div>

                    <div>
                        <label class="block text-sm font-medium text-slate-600 mb-1">پورا نام <span
                                class="text-red-500">*</span></label>
                        <input type="text" id="Full_Name" name="Full_Name" required
                            class="w-full px-4 py-3 rounded-2xl border border-slate-200 focus:border-emerald-500 focus:ring-2 focus:ring-emerald-200 outline-none"
                            placeholder="مکمل نام درج کریں">
                    </div>

                    <div>
                        <label class="block text-sm font-medium text-slate-600 mb-1">رجسٹرڈ فون نمبر <span
                                class="text-red-500">*</span></label>
                        <input type="tel" id="Registered_Phone_Number" name="Registered_Phone_Number" required
                            class="w-full px-4 py-3 rounded-2xl border border-slate-200 focus:border-emerald-500 focus:ring-2 focus:ring-emerald-200 outline-none"
                            placeholder="0300-1234567">
                    </div>

                    <div>
                        <label class="block text-sm font-medium text-slate-600 mb-1">کالج / ادارہ کا نام <span
                                class="text-red-500">*</span></label>
                        <input type="text" id="College_Institution_Name" name="College_Institution_Name" required
                            class="w-full px-4 py-3 rounded-2xl border border-slate-200 focus:border-emerald-500 focus:ring-2 focus:ring-emerald-200 outline-none">
                    </div>

                    <div>
                        <label class="block text-sm font-medium text-slate-600 mb-1">شہر <span
                                class="text-red-500">*</span></label>
                        <input type="text" id="Address_City" name="Address_City" required
                            class="w-full px-4 py-3 rounded-2xl border border-slate-200 focus:border-emerald-500 focus:ring-2 focus:ring-emerald-200 outline-none">
                    </div>

                    <button type="submit"
                        class="w-full bg-emerald-700 hover:bg-emerald-800 transition-colors text-white font-semibold py-4 rounded-3xl text-lg flex items-center justify-center gap-3 shadow-lg">
                        <i class="fa-solid fa-arrow-right"></i>
                        کوئز شروع کریں
                    </button>
                </form>
            </div>

            <p class="text-center text-slate-500 text-sm mt-6">Powered by xAI • Made with ❤️ for Knowledge</p>
        </div>
    </div>

    <!-- QUIZ SCREEN -->
    <div id="quizScreen" class="hidden min-h-screen bg-slate-950 text-white">
        <!-- Header -->
        <div class="sticky top-0 bg-slate-900 border-b border-slate-700 z-50">
            <div class="max-w-4xl mx-auto px-4 py-4 flex items-center justify-between">
                <div class="flex items-center gap-3">
                    <i class="fa-solid fa-kaaba text-emerald-400"></i>
                    <div>
                        <div class="font-bold text-lg">علمِ ابراہیمی</div>
                        <div class="text-xs text-slate-400" id="playerNameHeader"></div>
                    </div>
                </div>

                <div class="flex items-center gap-6">
                    <div class="text-center">
                        <div class="text-2xl font-mono font-bold text-emerald-400" id="timer">00:00</div>
                        <div class="text-[10px] text-slate-400 tracking-widest">TIME</div>
                    </div>

                    <div class="h-10 w-px bg-slate-700"></div>

                    <div class="text-center">
                        <div class="flex items-center gap-1.5">
                            <span class="text-emerald-400 font-bold text-xl" id="currentQ">1</span>
                            <span class="text-slate-500">/</span>
                            <span class="text-slate-400" id="totalQ">30</span>
                        </div>
                        <div class="h-1.5 w-24 bg-slate-700 rounded-full overflow-hidden mt-1">
                            <div class="progress-bar h-full bg-gradient-to-r from-emerald-400 to-teal-400 w-1/30"
                                id="progress"></div>
                        </div>
                    </div>
                </div>
            </div>
        </div>

        <div class="max-w-4xl mx-auto px-4 py-8">
            <!-- Question -->
            <div class="bg-slate-900 rounded-3xl p-8 mb-8 shadow-2xl border border-slate-700 islamic-pattern">
                <div class="flex items-center gap-3 mb-6">
                    <div class="px-4 py-1 bg-slate-800 text-emerald-400 text-sm font-medium rounded-full" id="qNumber">
                    </div>
                    <div class="text-slate-400 text-sm">حضرت ابراہیم علیہ السلام / قربانی کے مسائل</div>
                </div>

                <p id="questionText" class="question-text text-2xl leading-relaxed text-slate-100"></p>
            </div>

            <!-- Options -->
            <div id="optionsContainer" class="grid grid-cols-1 md:grid-cols-2 gap-4">
                <!-- Populated by JS -->
            </div>

            <!-- Footer Controls -->
            <div class="mt-10 flex justify-between items-center max-w-2xl mx-auto">
                <!-- <button onclick="prevQuestion()" id="prevBtn"
                    class="px-6 py-3 bg-slate-800 hover:bg-slate-700 rounded-2xl flex items-center gap-2 transition-colors disabled:opacity-50">
                    <i class="fa-solid fa-arrow-left"></i>
                    <span>پچھلا</span>
                </button> -->

                <button onclick="nextQuestion()" id="nextBtn"
                    class="px-8 py-3 bg-emerald-600 hover:bg-emerald-700 rounded-3xl flex items-center gap-3 font-semibold transition-all">
                    <span id="nextText">اگلا سوال</span>
                    <i class="fa-solid fa-arrow-right"></i>
                </button>
            </div>
        </div>
    </div>

    <!-- RESULT SCREEN -->
    <div id="resultScreen"
        class="hidden min-h-screen bg-gradient-to-br from-emerald-900 to-slate-950 text-white flex items-center justify-center p-4">
        <div
            class="max-w-2xl w-full bg-slate-900/90 backdrop-blur-xl rounded-3xl p-10 border border-emerald-500/30 shadow-2xl">
            <div class="text-center mb-8">
                <div id="scoreCircle"
                    class="w-32 h-32 mx-auto rounded-full border-8 border-emerald-500 flex items-center justify-center text-5xl font-bold mb-6">
                </div>
                <h2 class="text-4xl font-bold mb-2" id="resultTitle">مبارک ہو!</h2>
                <p class="text-emerald-300" id="resultSubtitle"></p>
            </div>

            <div class="grid grid-cols-2 gap-4 mb-10">
                <div class="bg-slate-800 rounded-2xl p-6 text-center">
                    <div class="text-emerald-400 text-sm">صحیح جوابات</div>
                    <div class="text-5xl font-bold text-emerald-400 mt-2" id="correctCount">18</div>
                </div>
                <div class="bg-slate-800 rounded-2xl p-6 text-center">
                    <div class="text-red-400 text-sm">غلط جوابات</div>
                    <div class="text-5xl font-bold text-red-400 mt-2" id="incorrectCount">7</div>
                </div>
            </div>

            <div class="space-y-4 text-sm">
                <div class="flex justify-between py-3 border-b border-slate-700">
                    <span class="text-slate-400">نام:</span>
                    <span id="resName" class="font-medium"></span>
                </div>
                <div class="flex justify-between py-3 border-b border-slate-700">
                    <span class="text-slate-400">Player ID:</span>
                    <span id="resPlayerId" class="font-mono"></span>
                </div>
                <div class="flex justify-between py-3 border-b border-slate-700">
                    <span class="text-slate-400">شروع کا وقت:</span>
                    <span id="resStart" class="font-mono"></span>
                </div>
                <div class="flex justify-between py-3 border-b border-slate-700">
                    <span class="text-slate-400">ختم کا وقت:</span>
                    <span id="resEnd" class="font-mono"></span>
                </div>
                <div class="flex justify-between py-3 border-b border-slate-700">
                    <span class="text-slate-400">کل وقت:</span>
                    <span id="resTime" class="font-medium"></span>
                </div>
            </div>

            <div class="mt-10 flex gap-4">
                <button onclick="restartQuiz()"
                    class="flex-1 py-5 bg-slate-800 hover:bg-slate-700 rounded-3xl font-semibold transition-colors">
                    دوبارہ شروع کریں
                </button>
                <button onclick="window.location.reload()"
                    class="flex-1 py-5 bg-emerald-600 hover:bg-emerald-700 rounded-3xl font-semibold transition-colors">
                    شکریہ
                </button>
            </div>
        </div>
    </div>

        let currentQuestionIndex = 0;
        let score = 0;
        let selectedAnswers = [];
        let timerInterval;
        let startTime;
        let playerData = {};

        // Tailwind script already included

        function generateUserId() {
            const id = "QZ-" + Math.floor(100000 + Math.random() * 900000);
            document.getElementById("UserId").value = id;
            return id;
        }

        // Form Submit
        document.getElementById("playerForm").addEventListener("submit", async function (e) {
            e.preventDefault();

            playerData = {
                UserId: document.getElementById("UserId").value,
                Full_Name: document.getElementById("Full_Name").value,
                Registered_Phone_Number: document.getElementById("Registered_Phone_Number").value,
                College_Institution_Name: document.getElementById("College_Institution_Name").value,
                Address_City: document.getElementById("Address_City").value,
                Started_At: new Date().toISOString()
            };

            // Send to SheetDB
            try {
                await fetch("https://sheetdb.io/api/v1/y5ga5zan0r7j3?sheet=QuizPlayers", {
                    method: "POST",
                    headers: { "Content-Type": "application/json" },
                    body: JSON.stringify({ data: [playerData] })
                });
            } catch (err) {
                console.log("Form saved locally (demo)");
            }

            // Start Quiz
            document.getElementById("registerScreen").classList.add("hidden");
            document.getElementById("quizScreen").classList.remove("hidden");

            document.getElementById("playerNameHeader").textContent = playerData.Full_Name;
            startTime = Date.now();
            startTimer();
            loadQuestion(0);
        });

        function startTimer() {
            let seconds = 0;
            timerInterval = setInterval(() => {
                seconds++;
                const min = Math.floor(seconds / 60);
                const sec = seconds % 60;
                document.getElementById("timer").textContent =
                    `${min.toString().padStart(2, '0')}:${sec.toString().padStart(2, '0')}`;
            }, 1000);
        }

        function loadQuestion(index) {
            currentQuestionIndex = index;
            const q = QuestionsBank[index];

            document.getElementById("qNumber").textContent = `سوال ${index + 1}`;
            document.getElementById("currentQ").textContent = index + 1;
            document.getElementById("questionText").textContent = q.question;
            document.getElementById("progress").style.width = `${((index + 1) / QuestionsBank.length) * 100}%`;

            const container = document.getElementById("optionsContainer");
            container.innerHTML = "";

            q.options.forEach((option, i) => {
                const btn = document.createElement("button");
                btn.className = `option-btn w-full text-left p-6 rounded-3xl border border-slate-700 bg-slate-800 hover:bg-slate-700 text-lg transition-all`;
                btn.innerHTML = `
                    <span class="inline-flex items-center justify-center w-8 h-8 rounded-2xl bg-slate-700 text-sm mr-4">${String.fromCharCode(65 + i)}</span>
                    ${option}
                `;
                btn.onclick = () => selectAnswer(i, btn, q.answer);
                container.appendChild(btn);
            });

            // Enable/disable prev/next
            document.getElementById("prevBtn").disabled = index === 0;
        }

        function selectAnswer(optionIndex, buttonElement, correctAnswer) {
            const allBtns = document.querySelectorAll("#optionsContainer button");

            // Disable all buttons after selection
            allBtns.forEach(btn => btn.disabled = true);

            // Add selected style to the button user pressed
            buttonElement.classList.add("selected");

            // Get selected answer text
            const selectedText = buttonElement.textContent.trim().substring(2).trim();
            selectedAnswers[currentQuestionIndex] = selectedText;

            // Optional: Increase score internally (but don't show feedback)
            if (selectedText === correctAnswer) {
                score++;
            }

            // Auto move to next question after 1.2 seconds
            setTimeout(() => {
                if (currentQuestionIndex < QuestionsBank.length - 1) {
                    loadQuestion(currentQuestionIndex + 1);
                } else {
                    endQuiz();
                }
            }, 1400);
        }

        function nextQuestion() {
            if (currentQuestionIndex < QuestionsBank.length - 1) {
                loadQuestion(currentQuestionIndex + 1);
            } else {
                endQuiz();
            }
        }

        function prevQuestion() {
            if (currentQuestionIndex > 0) {
                loadQuestion(currentQuestionIndex - 1);
            }
        }

        function endQuiz() {
            clearInterval(timerInterval);
            const endTime = new Date().toISOString();
            const timeTaken = Math.floor((Date.now() - startTime) / 1000);

            const resultData = {
                ...playerData,
                Ended_At: endTime,
                Total_Time_Taken: `${Math.floor(timeTaken / 60)}m ${timeTaken % 60}s`,
                Total_Correct: score,
                Total_Incorrect: QuestionsBank.length - score,
                PlayerId: playerData.UserId,
                PlayerName: playerData.Full_Name
            };

            // Send Result
            fetch("https://sheetdb.io/api/v1/y5ga5zan0r7j3?sheet=QuizInfo", {
                method: "POST",
                headers: { "Content-Type": "application/json" },
                body: JSON.stringify({ data: [resultData] })
            }).catch(() => { });

            // Show Result Screen
            document.getElementById("quizScreen").classList.add("hidden");
            document.getElementById("resultScreen").classList.remove("hidden");

            document.getElementById("correctCount").textContent = score;
            document.getElementById("incorrectCount").textContent = QuestionsBank.length - score;
            document.getElementById("resName").textContent = playerData.Full_Name;
            document.getElementById("resPlayerId").textContent = playerData.UserId;
            document.getElementById("resStart").textContent = new Date(playerData.Started_At).toLocaleTimeString('ur-PK');
            document.getElementById("resEnd").textContent = new Date().toLocaleTimeString('ur-PK');
            document.getElementById("resTime").textContent = resultData.Total_Time_Taken;

            // Score Circle
            const percentage = Math.round((score / QuestionsBank.length) * 100);
            const circle = document.getElementById("scoreCircle");
            circle.textContent = percentage + "%";
            if (percentage >= 80) {
                circle.style.borderColor = "#4ade80";
            } else if (percentage >= 60) {
                circle.style.borderColor = "#eab308";
            } else {
                circle.style.borderColor = "#f87171";
            }
        }

        function restartQuiz() {
            window.location.reload();
        }

        // Initialize
        window.onload = () => {
            generateUserId();
            // You can add more questions here if needed
            console.log("%cQuiz Ready - Responsive & Beautiful", "color: #10b981; font-size: 16px; font-weight: bold");
        };
    </script>
